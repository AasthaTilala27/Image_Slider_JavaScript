<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider Project</title>

    <link rel="stylesheet" href="project-3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <h1>Scroll Button For Next Image◀️▶️</h1>

    <div class="slider">

        <button class="prev" onclick="prevSlide()">
            <i class="fa-solid fa-chevron-left"></i>
        </button>

        <div class="images"></div>

        <button class="next" onclick="nextSlide()">

            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </div>

    <script src="project-3.js"></script>

</body>
</html>
